[colors]
# Bakgrundsfärg: hexkod (#rrggbb) eller "random"
background = #232323

# Förgrundsfärg: hexkod (#rrggbb), "random" eller "gay" (regnbåge som blinkar snabbt)
# foreground = #ffffff
foreground = gay

[font]
# Typsnittsnamn — t.ex. "JetBrains Mono", "Iosevka", "monospace"
name = Terminus

# Storlek i punkter
size = 12

[window]
# Var launchern ska dyka upp: top eller bottom
position = bottom

# Höjd i pixlar
height = 32

# Hur många sökresultat som visas
max_results = 12
